slides:
  - modality: title_slide
    fields:
      title: "Fabric proof of concept"
      subtitle: "Translating spreadsheet logic into a governed execution pattern"

  - modality: index_slide
    fields:
      title: "Contents"
      sections:
        - "Problem framing"
        - "Hypothesis and success criteria"
        - "Options considered"
        - "Chosen approach"
        - "Architecture"
        - "Evidence"
        - "Learnings"
        - "Implications"
        - "Next steps"

  - modality: context_statement
    fields:
      title: "Spreadsheet logic can move into Fabric without losing control"

  - modality: problem_framing
    fields:
      title: "A manual spreadsheet process was becoming difficult to scale"
      body:
        - "Business logic sat inside spreadsheets rather than a managed execution layer"
        - "Files required manual handling before they could enter the data platform"
        - "Auditability and repeatability were weaker than the target operating model required"
        - "The key question was whether Fabric notebooks could preserve the logic while improving control"

  - modality: hypothesis_success_criteria
    fields:
      title: "The PoC had to prove both logic fidelity and platform fit"
      body_left:
        - "Translate spreadsheet logic into Python notebooks accurately"
        - "Run the process cleanly inside a Fabric and lakehouse pattern"
      body_right:
        - "Improve repeatability across ingestion and execution"
        - "Strengthen visibility without adding unnecessary complexity"

  - modality: options_considered
    fields:
      title: "Several paths existed, but only one balanced control and repeatability"
      intro:
        - "The decision was not whether change was possible"
        - "It was which execution model created the strongest operational footing"
      boxes:
        - "Retain spreadsheet execution"
        - "Automate around the spreadsheet"
        - "Translate logic into Fabric notebooks"

  - modality: chosen_approach
    fields:
      title: "The chosen approach moved logic into Python notebooks"
      body:
        - "The spreadsheet was treated as logic to be translated rather than simply automated around"
        - "Fabric notebooks became the execution surface for that logic"
        - "The surrounding flow was designed to support controlled ingestion into the lakehouse"

  - modality: architecture_view
    fields:
      title: "Architecture: spreadsheet ingestion and notebook execution in Fabric"
      body:
        - "Files move through a controlled ingestion path"
        - "Python notebooks execute the translated business logic inside Fabric"
        - "Outputs land in the lakehouse for reporting and downstream reasoning"
      image: "example_architecture.png"

  - modality: evidence_results
    fields:
      title: "The PoC proved the logic could move into Fabric cleanly"
      lead: "The notebook pattern was workable, governed and better aligned to repeatable processing."
      proof_points:
        - "Spreadsheet logic translated successfully into Python notebooks"
        - "Fabric operated effectively as the execution layer"
        - "The pattern created a stronger footing for automation and reporting"
      image: "fabric_results_example.png"

  - modality: learnings_constraints
    fields:
      title: "The main lessons were about process discipline and dependency"
      body:
        - "The harder problem was surfacing implicit spreadsheet assumptions, not notebook execution"
        - "Human intervention still mattered at the ingestion boundary where source quality varied"
        - "Folder and metadata handling mattered more than expected in making the flow reliable"
        - "A controlled trigger point was better than forcing full end-to-end automation too early"

  - modality: implications
    fields:
      title: "The result supports a move to platform-managed execution"
      body:
        - "The logic no longer needs to remain trapped inside a manually operated spreadsheet"
        - "Fabric can act as both an execution environment and a bridge into more governed data handling"
        - "Future automation should focus on reliable ingestion conditions rather than forced autonomy"

  - modality: next_steps
    fields:
      title: "The next step is to operationalise the pattern properly"
      body_left:
        - "Refine ingestion controls"
        - "Harden notebook execution"
      body_right:
        - "Extend lakehouse outputs"
        - "Connect into reporting"

  - modality: closing_slide
    fields:
      title: "Thank you"
      contact: "David Rowley | IBM Consulting"