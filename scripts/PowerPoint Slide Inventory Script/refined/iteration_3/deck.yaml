slides:
- modality: title_slide
  fields:
    title: IBM + Stable Proposal for NRW DDaT Framework
    subtitle: Digital transformation delivery for Natural Resources Wales
    notes: Welcome. Today we share the IBM and Stable joint response to the NRW DDaT
      framework, including proposition, delivery approach, and commercial model.
  notes: 'Welcome and introductions. This presentation sets out the IBM and Stable
    joint response to the NRW DDaT framework opportunity. We will cover our proposition,
    delivery approach, and commercial model.

    '
- modality: index_slide
  fields:
    title: Agenda
    sections:
    - Joint proposition & introductions
    - Strengths & differentiators
    - '{''Scenario 1'': ''Customer Platform''}'
    - '{''Scenario 2'': ''Website Innovation Window''}'
    - Sustainability & social value
    - Commercial approach & close
- modality: chosen_approach
  fields:
    title: 'Our joint proposition: scale, local presence, sustainable capability'
    body:
    - IBM and Stable blended delivery model — proven transformation at scale
    - 'Strong alignment with NRW objectives: customer experience and data maturity'
    - Sustainable capability uplift as a core delivery outcome
    - Bilingual Welsh-based execution through the Team Wales model
  notes: 'IBM brings enterprise-grade DDaT capability and deep Microsoft ecosystem
    expertise. Stable brings Welsh-based bilingual delivery and strong local stakeholder
    relationships. Together the proposition is greater than the sum of its parts —
    addressing NRW''s need for scale, sustainability and local accountability.

    '
- modality: problem_framing
  fields:
    title: IBM delivers end-to-end DDaT for NRW
    body:
    - '{''End-to-end DDaT'': ''discovery to operations''}'
    - '{''Deep Microsoft ecosystem'': ''Dynamics 365, Power Platform, Azure, Fabric''}'
    - Proven delivery in regulated, multi-supplier environments
    - Structured approach via IBM Digital Product Design & Engineering
    - Integrated architecture, data, and product delivery
- modality: learnings_constraints
  fields:
    title: Key differentiators vs other framework suppliers
    body:
    - Embedded, stable bilingual Welsh delivery (Team Wales model)
    - Capability uplift built into delivery from day one
    - Product-led delivery with governance discipline and audit traceability
    - Evidence-based decisions to avoid early over-commitment
- modality: context_statement
  fields:
    title: A unified customer experience across NRW services and channels
    body:
    - Align services and channels to deliver consistent, end-to-end journeys for citizens
      and businesses.
- modality: options_considered
  fields:
    title: Three parallel tracks to shape an evidence-based roadmap
    intro:
    - '{''Outcome'': ''evidence-based roadmap and investment business case''}'
    body_left:
    - '{''Lane 1'': ''User & stakeholder discovery''}'
    - Insights, needs, journey, adoption signals
    - '{''Output'': ''roadmap inputs and prioritised requirements''}'
    body_right:
    - '{''Lane 2'': ''Technical & architectural assessment''}'
    - Current state, target architecture, feasibility
    - '{''Output'': ''solution options and delivery constraints''}'
    boxes:
    - '{''Lane 3'': ''Commercial & delivery framing''}'
    - '{''Business case'': ''benefits, costs, delivery approach''}'
    - '{''Output'': ''investment case and implementation plan''}'
- modality: implications
  fields:
    title: Evidence to Investment Decisions
    body:
    - Trace needs to architecture to commercial choices—full traceability
    - '{''Validate assumptions'': ''scale, complexity, and technical readiness''}'
    - Use a staged, proportionate investment roadmap
    - Commit only after delivery feasibility confidence
- modality: architecture_view
  fields:
    title: NRW Customer Platform — Four-layer Architecture
    body:
    - '{''Customer Engagement'': ''portals, web, content, bilingual interfaces''}'
    - '{''CRM & Service Management'': ''Dynamics 365 as system of action''}'
    - '{''Integration & Platform Services'': ''Azure API, orchestration, events''}'
    - '{''Data & Insights'': ''governed Azure + Fabric data services''}'
- modality: four_pillars
  fields:
    title: Architectural principles for platform design
    pillars:
    - '{''title'': ''Cloud-first, SaaS-preferred'', ''body'': ''Minimize custom build''}'
    - '{''title'': ''API-first & event-driven'', ''body'': ''Decouple for interoperability''}'
    - '{''title'': ''Governed data'', ''body'': ''Lineage, ownership, access controls''}'
    - '{''title'': ''Secure-by-design & modular'', ''body'': ''Compliant across layers;
      avoid legacy lock-in''}'
- modality: options_considered
  fields:
    title: Platform building blocks
    body_left:
    - '{''Dynamics 365'': ''Authoritative customer domain and system of action''}'
    - '{''CMS & SharePoint'': ''Structured content, publishing, and knowledge''}'
    body_right:
    - '{''Azure Integration'': ''Decoupled data movement and orchestration''}'
    - '{''Data platform'': ''Trusted, discoverable, reusable customer and operational
      data''}'
- modality: problem_framing
  fields:
    title: NRW data fragmentation hinders integration
    body:
    - Unify records progressively using a canonical customer ID
    - Map and match across legacy systems and datasets
    - Use event-driven updates for near real-time consistency
    - Avoid big-bang consolidation to reduce integration risk
- modality: learnings_constraints
  fields:
    title: Data sequencing & key risks across the lifecycle
    body:
    - '{''Early'': ''Identity model, APIs, event layer foundations''}'
    - '{''Mid-term'': ''Deduplication, survivorship rules, governance processes''}'
    - '{''Long-term'': ''Controlled consolidation across legacy systems''}'
    - '{''Key risks'': ''Data quality, legacy dependencies, ownership clarity''}'
- modality: strategy
  fields:
    title: Product-team delivery model
    body:
    - '{''Discovery'': ''multidisciplinary, hypothesis-led, time-boxed''}'
    - Alpha, Beta, Live delivered by long-lived product teams
    - IBM, Stable, NRW capabilities embedded across phases
    - Ownership and skills transition progressively to NRW
- modality: chosen_approach
  fields:
    title: Three-tier governance for delivery control
    body:
    - '{''Strategic'': ''alignment, prioritisation, stakeholder confidence''}'
    - '{''Programme'': ''milestones, budget, dependencies, risk tracking''}'
    - '{''Technical'': ''standards, security, architectural consistency''}'
    - Risk management embedded across all delivery cycles
- modality: learnings_constraints
  fields:
    title: Security, testing, and operations by design
    body:
    - 'Security-by-design: zero trust and early threat modelling'
    - 'Proportionate testing: automated, performance, and pen coverage'
    - 'Observability & resilience: runbooks from day one'
    - 'NRW transfer: skills, knowledge, and tooling ownership'
- modality: problem_framing
  fields:
    title: Blended resourcing model
    body:
    - '{''IBM experts'': ''architecture, engineering, data, security, product''}'
    - '{''Stable Team Wales'': ''Welsh-based delivery strength''}'
    - '{''Hybrid delivery'': ''on-site + remote collaboration across Wales''}'
    - NRW staff embedded to accelerate knowledge transfer
- modality: context_statement
  fields:
    title: A 12-week hypothesis-led window to generate evidence, not production builds
- modality: options_considered
  fields:
    title: Innovation mode selection
    body_left:
    - '{''Discovery-led'': ''Explore unclear problems and define the right question''}'
    - '{''Proof-led'': ''Test feasibility with clear hypotheses and constraints''}'
    body_right:
    - '{''Optimisation-led'': ''Improve known pain points with measurable outcomes''}'
    - Choose by clarity and readiness, using agreed hypotheses and context
- modality: four_pillars
  fields:
    title: Four phases of the 12-week innovation programme
    pillars:
    - '{''title'': ''Phase 1 — Explore & Discover'', ''body'': ''Journeys, data, content,
      accessibility''}'
    - '{''title'': ''Phase 2 — Ideate & Co-create'', ''body'': ''Prototypes, experiments,
      bilingual review''}'
    - '{''title'': ''Phase 3 — Build & Co-execute'', ''body'': ''Technical feasibility
      and integration''}'
    - '{''title'': ''Phase 4 — Scale & Decide'', ''body'': ''Evidence packs and investment
      recommendations''}'
- modality: options_considered
  fields:
    title: Expected outputs from the 12-week innovation window
    body_left:
    - Bilingual IA & navigation prototypes with user-tested journeys
    - Search improvements and reusable bilingual content patterns
    - Accessibility (WCAG) enhancements with documented audit trail
    body_right:
    - Journey prototypes and feasibility evidence for live data integration
    - Prioritised backlog and investment decision evidence pack
- modality: learnings_constraints
  fields:
    title: Innovation window risks and mitigations
    body:
    - Clarify baseline hypothesis at programme start
    - Secure user and content-owner access across all four phases
    - CMS/platform constraints limit feasible scope
    - '{''Manage expectations'': ''evidence and prototypes, not production''}'
- modality: implications
  fields:
    title: Embed sustainability in our digital delivery model
    body:
    - Apply GreenOps and FinOps for carbon-aware cloud usage
    - Optimize resource allocation and environment lifecycle
    - Enable digital solutions for NRW environmental insight objectives
    - Align delivery with NRW sustainability goals and net-zero commitments
- modality: implications
  fields:
    title: Social value commitments in Wales (Stable + IBM)
    body:
    - '{''Welsh SMEs'': ''direct local jobs and skills impact''}'
    - Internships, skills programmes, and university partnerships
    - Support for Welsh charities and local digital communities
    - Commitments scaled proportionately at call-off stage
- modality: options_considered
  fields:
    title: Commercial model options for discovery-first delivery
    body_left:
    - Time & Materials for discovery and shaping phases
    - Transparent rate-card assumptions with volume discount principles
    body_right:
    - Fixed price or fixed capacity for defined delivery scope
    - Volume efficiencies for sustained and expanded engagement
- modality: context_statement
  fields:
    title: Outcomes-led, evidence-based delivery for NRW
    body:
    - IBM and Stable align on measurable outcomes and transparent evidence.
    - Designed to support NRW priorities with practical, scalable execution.
- modality: closing_slide
  fields:
    title: Questions & discussion
    body:
    - We welcome your questions on today’s proposal—please challenge assumptions.
    - Share your top priorities, key risks, and desired next steps.
    - Thank you for your time.
