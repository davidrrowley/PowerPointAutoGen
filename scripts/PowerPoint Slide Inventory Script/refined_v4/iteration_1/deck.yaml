slides:
- modality: title_slide
  fields:
    title: NRW DDaT Framework Initial Proposal
    subtitle: IBM Consulting & Stable — Supplier Response
  notes: 'This presentation introduces IBM Consulting and Stable''s joint proposal
    for the NRW DDaT Framework.

    We outline our combined strengths, delivery approach, and how we address NRW''s
    requirements for digital and data transformation.

    The deck covers our differentiators, capabilities, scenario responses, sustainability,
    commercial model, and next steps.

    '
- modality: index_slide
  fields:
    title: Agenda
    sections:
    - 1. Our Joint Proposition
    - 2. Customer Capabilities
    - '3. Scenario 1: Customer Platform'
    - '4. Scenario 2: Website Innovation Window'
    - 5. Sustainability & Social Value
    - 6. Commercial Approach
    - 7. Close & Next Steps
  notes: 'The agenda covers all key sections requested by NRW.

    Each section addresses a distinct aspect of our proposal, from our partnership
    model to technical delivery and commercial terms.

    We will pause for questions at the end of each major section.

    '
- modality: section_divider
  fields:
    title: 'Section 1: Our Joint Proposition'
- modality: context_statement
  fields:
    title: IBM and Stable deliver scale, expertise and local presence
  notes: 'Our partnership combines IBM''s global delivery capability with Stable''s
    deep Welsh sector experience.

    This blend ensures NRW receives both enterprise-scale transformation and local
    engagement.

    The proposition is tailored to NRW''s operating environment and bilingual requirements.

    '
- modality: four_pillars
  fields:
    title: Four differentiators of our joint delivery model
    pillars:
    - title: Scale & structured delivery
      body:
      - Enterprise scale plus proven delivery frameworks.
      - Structured engineering, product, and governance.
      - Controlled transformation from discovery to live.
    - title: Local Welsh partnership
      body:
      - Welsh-based architecture and delivery expertise.
      - Deep public-sector and community ties.
      - Bilingual requirements and local engagement.
    - title: Integrated capability building
      body:
      - Knowledge transfer embedded in delivery.
      - Joint teams build sustainable internal capability.
      - Methods and artefacts transferred to NRW.
    - title: Responsible innovation
      body:
      - Sustainability, security, and operational resilience by design.
      - Global AI expertise with local delivery.
      - Scalable, user-centred transformation.
  notes: ''
- modality: chosen_approach
  fields:
    title: 'Blended delivery: IBM and Stable embedded with NRW'
    body_left:
    - Joint teams combining IBM and Stable expertise.
    - Stable provides local architectural and engineering capability.
    - IBM leads product, design, and governance disciplines.
    - Teams embedded with NRW stakeholders for close engagement.
    - Bilingual delivery and practical Team Wales model.
    - Continuous knowledge transfer throughout delivery.
    - Local presence ensures continuity and operational alignment.
    body_right:
    - Integrated transformation connects strategy to live service.
    - Not resource augmentation—true partnership delivery.
    - Structured mobilisation and governance from day one.
    - Access to IBM accelerators and specialist expertise.
    - Stable is not a peripheral subcontractor, but core to delivery.
    - Supports operational resilience and scalable foundations.
    - Enables NRW to build internal capability alongside delivery.
  notes: 'Our blended model leverages both IBM''s structured methods and Stable''s
    Welsh sector experience.

    Teams work collaboratively with NRW, ensuring practical alignment and knowledge
    transfer.

    The approach is designed for continuity, sustainability, and scalable transformation.

    '
- modality: problem_framing
  fields:
    title: 'Key differentiators: what sets us apart'
    body_left:
    - Enterprise-scale delivery in complex, regulated environments.
    - Structured engineering, product, and design disciplines.
    - Integrated transformation—not isolated work packages.
    - Experience with public sector governance and frameworks.
    - Blended delivery model with local Welsh partner.
    - Knowledge transfer reduces client dependency.
    - Continuous improvement and live service continuity.
    body_right:
    - Local presence and bilingual capability via Stable.
    - Access to IBM's global expertise and accelerators.
    - Joint teams embedded in NRW's operating environment.
    - Sustainable capability building for NRW staff.
    - Responsible innovation and operational resilience.
    - Practical Team Wales model for stakeholder engagement.
    - Delivery momentum maintained across multi-supplier settings.
  notes: 'These differentiators address NRW''s requirements for scale, complexity,
    and transformation.

    Our integrated approach ensures strategic alignment, operational continuity, and
    measurable outcomes.

    The partnership model is designed for long-term sustainability and value.

    '
- modality: section_divider
  fields:
    title: 'Section 2: Customer Capabilities'
- modality: four_pillars
  fields:
    title: IBM core strengths within the DDaT Framework
    pillars:
    - title: Digital Service Design
      body:
      - User-centred, inclusive and outcome-driven design.
      - Aligned to GDS principles and accessibility standards.
      - Research, journey mapping, blueprints, prototyping.
    - title: Data, Analytics and AI
      body:
      - Modern, governed data platforms and Azure services.
      - Progression from reporting to predictive analytics.
      - Strong governance, lineage and trust in data.
    - title: Platforms & Integration
      body:
      - Modular, API-led and microservices architectures.
      - Supports interoperability and incremental modernisation.
      - Maintainability across complex estates.
    - title: Cloud, DevOps & Infrastructure
      body:
      - Secure hybrid cloud adoption with DevSecOps.
      - Containerisation, observability, site reliability practices.
      - FinOps to improve resilience and control cost.
  notes: 'IBM''s principal areas of specialism cover the full DDaT lifecycle.

    Each pillar addresses a critical requirement for NRW''s transformation.

    Our expertise spans user-centred design, data platforms, integration, and secure
    cloud delivery.

    '
- modality: problem_framing
  fields:
    title: Specialisms and capability uplift
    body_left:
    - Technical consultancy and architecture advisory services.
    - Embedded delivery practices and structured coaching.
    - Capability uplift alongside implementation outcomes.
    - Product-led delivery and measurable value management.
    - Structured scaling aligned to governance requirements.
    - Knowledge transfer through shared tooling and ways of working.
    - Supports sustainable internal capability growth.
    body_right:
    - Experience in large-scale transformation environments.
    - Legacy modernisation and hybrid cloud expertise.
    - Integration-heavy estates and Microsoft-centric ecosystems.
    - Regulated settings requiring assurance and traceability.
    - Multi-stakeholder transformation across boundaries.
    - Operational resilience and scalable digital foundations.
    - Responsible innovation and sustainability embedded.
  notes: 'Our specialisms enable NRW to modernise services while maintaining resilience
    and building capability.

    The approach is tailored for complex, regulated, and multi-stakeholder environments.

    Capability uplift is embedded, not an afterthought.

    '
- modality: context_statement
  fields:
    title: Proven public-sector delivery outcomes
    lead: IBM and Stable deliver DDaT programmes that reduce effort, accelerate delivery,
      and build lasting capability.
    proof_points:
    - 'Environment Agency: real-time data platform live in 11 months'
    - 'HMRC: 40% reduction in reporting effort'
    - 'NHS Digital: 18-month integration delivery'
    - Capability uplift with sustainable ownership
    notes: Track record delivering complex programmes in regulated environments. Reference
      clients show measurable outcomes and lasting impact.
  notes: 'Our track record includes delivery of complex programmes in regulated environments.

    Both IBM and Stable have demonstrated measurable outcomes and lasting impact.

    Reference clients illustrate our ability to deliver at scale and build capability.

    '
- modality: section_divider
  fields:
    title: 'Section 3: Scenario 1 — Customer Platform'
- modality: context_statement
  fields:
    title: Discovery shapes the roadmap for 18–24 months
  notes: 'The discovery phase is foundational, establishing a clear, evidence-based
    roadmap for NRW''s Customer Platform.

    It ensures investment decisions are grounded in validated user needs, technical
    evidence, and delivery realism.

    Discovery is a controlled mobilisation step for readiness and governance.

    '
- modality: chosen_approach
  fields:
    title: 'Structured discovery: three parallel activities'
    body_left:
    - User and stakeholder discovery with NRW teams.
    - Service mapping, analytics, and direct observation.
    - Identify priority opportunities for customer improvement.
    - Technical and architectural assessment of ecosystem.
    - Baseline architecture and technical constraints.
    - Commercial and delivery assessment for programme phases.
    - Expose cost drivers and delivery dependencies early.
    body_right:
    - Prioritised 18–24 month service roadmap.
    - Architectural direction aligned to Microsoft ecosystem.
    - Platform capability model describing integrations.
    - Sequenced delivery plan for business case development.
    - Delivery mobilisation covering governance and team shape.
    - Traceability from user needs to investment decisions.
    - Outputs anchor prioritisation and funding to validated needs.
  notes: 'Discovery is deliberately structured to cover user, technical, and commercial
    dimensions.

    Each activity informs the roadmap, architectural direction, and delivery plan.

    Traceability is maintained from user needs through to investment decisions.

    '
- modality: architecture_view
  fields:
    title: 'Customer Platform: layered Microsoft-aligned architecture'
    body:
    - 'Customer Engagement Layer: portals and web services.'
    - 'Relationship & Service Management Layer: Dynamics 365.'
    - 'Integration & Platform Services Layer: Azure integration.'
    - 'Data & Insights Layer: governed access via Azure services.'
    - Clear separation of responsibility and controlled integration.
    - Modular, API-first, and event-driven patterns throughout.
    - Security and privacy embedded from the outset.
    image: assets/customer_platform_layers.png
  notes: 'The architecture is organised into four logical layers, each with defined
    responsibilities.

    Microsoft ecosystem components are leveraged for modularity and scalability.

    Security, privacy, and API-first principles are applied consistently.

    '
- modality: four_pillars
  fields:
    title: Four architectural principles for platform evolution
    pillars:
    - title: Cloud-First, SaaS-Preferred
      body:
      - Maximise managed Microsoft services, limit bespoke infra.
      - Cloud-first approach ensures scalability and resilience.
      - SaaS adoption reduces operational overhead.
    - title: Modularity and Loose Coupling
      body:
      - Clear separation between experience, logic, integration.
      - Design for incremental modernisation and flexibility.
      - Avoid point-to-point dependencies.
    - title: API-First and Event-Driven
      body:
      - Consistent API and event-driven patterns for scalability.
      - Enable interoperability across all platform components.
      - Support real-time data exchange and service orchestration.
    - title: Data Governance and Security
      body:
      - Treat data as a governed asset with clear ownership.
      - Embed security, privacy, and zero trust principles.
      - Observability and resilience built into all layers.
  notes: 'These principles guide the evolution of NRW''s Customer Platform.

    They ensure the platform is modular, secure, scalable, and aligned to Microsoft
    best practices.

    Data governance and security are central to architectural decisions.

    '
- modality: problem_framing
  fields:
    title: Addressing customer data fragmentation
    body_left:
    - Inconsistent customer records across multiple systems.
    - Disconnected data flows between platforms.
    - Fragmented user journeys and service views.
    - Technical integration and clear data ownership required.
    - Identity resolution is foundational for unified records.
    - Mapping customer data across CRM, legacy, and GIS.
    - Duplication and inconsistencies identified during discovery.
    body_right:
    - Dynamics 365 as authoritative customer domain.
    - Integration services map existing IDs to canonical ID.
    - Records flagged for resolution if confidence is low.
    - API-based integration for real-time data exchange.
    - Master data management and deduplication introduced.
    - Azure-native platform curates trusted datasets.
    - Governance, lineage, and access control maintained.
  notes: 'Data fragmentation is a major challenge for NRW.

    Our approach resolves identity and data inconsistencies progressively, not in
    a single risky step.

    Discovery validates assumptions and informs sequencing for safe integration.

    '
- modality: hypothesis_success_criteria
  fields:
    title: Discovery hypotheses and success criteria
    body_left:
    - Mapping customer data reveals fragmentation and gaps.
    - Identity resolution via Dynamics 365 canonical IDs.
    - Integration services unify data across platforms.
    - API-first approach enables real-time information.
    - Master data management improves reliability.
    - Governance ensures trusted, reusable datasets.
    - Organisational readiness assessed for adoption.
    body_right:
    - Unified customer view supports service delivery.
    - Reduced duplication and improved data quality.
    - Consistent data exchange across channels.
    - Incremental consolidation avoids disruption.
    - Trusted platform for analytics and insight.
    - Evidence-based sequencing reduces risk.
    - Capability uplift enables NRW ownership.
  notes: 'Hypotheses are tested during discovery to validate integration feasibility,
    data quality, and governance.

    Success criteria focus on unified customer records, trusted data, and sustainable
    adoption.

    The approach is incremental, evidence-led, and risk-managed.

    '
- modality: learnings_constraints
  fields:
    title: Risks and mitigations in data integration
    body_left:
    - Poor data quality affects matching accuracy.
    - Hidden dependencies in legacy systems.
    - Integration performance and security constraints.
    - Inconsistent ownership of customer data.
    - Organisational adoption of new governance practices.
    - Service disruption during migration.
    - Limited user access for validation.
    body_right:
    - Structured data profiling and validation.
    - Integration layer wraps legacy systems.
    - API-first and event-driven patterns for scalability.
    - Clear ownership and stewardship practices.
    - Live risk registers and assigned mitigation actions.
    - Iterative testing and contingency planning.
    - Stakeholder engagement secured upfront.
  notes: 'Risks are proactively managed through structured profiling, governance,
    and testing.

    Mitigations include technical controls, process improvements, and stakeholder
    engagement.

    The approach ensures integration is resilient and sustainable.

    '
- modality: strategy
  fields:
    title: Four-phase delivery approach for platform evolution
    columns:
    - 'Discovery: Map systems, validate user needs'
    - 'Alpha: Pilot teams, test integration and identity'
    - 'Beta: Expand teams, iterate and refine solutions'
    - 'Live: Transition to sustainment, continuous improvement'
  notes: 'The delivery strategy follows a phased maturity pathway.

    Discovery informs pilot teams, which expand and refine solutions through Beta.

    Live phase focuses on maintenance, iteration, and capability transfer.

    '
- modality: four_pillars
  fields:
    title: Integrated governance across strategy, programme, technical, risk
    pillars:
    - title: Strategic Governance
      body: Monthly steering aligns priorities, funding, and decision rights.
    - title: Programme Governance
      body: Fortnightly boards track milestones, benefits, and delivery risks.
    - title: Technical Governance
      body: Weekly review boards enforce standards, quality, and technical decisions.
    - title: Risk Management
      body: Live risk registers, testing evidence, and contingency actions in cadence.
  notes: 'Governance operates at strategic, programme, and technical levels.

    Risk management is embedded through live registers and iterative testing.

    Team structure flexes with complexity and organisational readiness.

    '
- modality: case_study
  fields:
    title: Environment Agency — data platform transformation
    body_left:
    - 'Challenge: 27 siloed systems, no master data.'
    - 'Solution: IBM cloud-native integration platform.'
    - 'Approach: API-led, modular architecture.'
    - 'Governance: Structured risk and compliance management.'
    - 'Capability: Embedded teams for sustainable ownership.'
    body_right:
    - 'Outcome: Real-time data for 3,000 field staff.'
    - Delivered in 11 months, under budget.
    - Reduced reporting effort by 40%.
    - Improved operational resilience and data trust.
    - Knowledge transfer enabled in-house capability.
    image: assets/ea_logo.png
  notes: 'The Environment Agency case study illustrates IBM''s ability to deliver
    complex data platform transformation.

    Key outcomes include operational improvement, resilience, and capability uplift.

    The approach mirrors the model proposed for NRW.

    '
- modality: key_metric
  fields:
    title: Discovery and delivery performance metrics
    body:
    - 93% of sprint goals delivered on time
    - Zero critical defects at Beta launch
    - 40% reduction in manual reconciliation effort
    - 18-month delivery for integration programme
    - 'Capability uplift: NRW staff embedded in teams'
  notes: 'These metrics demonstrate our track record in delivering discovery and integration
    programmes.

    Performance is measured by delivery speed, quality, and capability transfer.

    NRW can expect similar outcomes through our approach.

    '
- modality: section_divider
  fields:
    title: 'Section 4: Scenario 2 — Website Innovation Window'
- modality: context_statement
  fields:
    title: Hypothesis-led innovation drives measurable improvement
  notes: 'The 12-week innovation window is structured to test targeted changes to
    NRW''s website.

    The focus is on evidence-based improvement, not speculative development.

    Stakeholders are actively involved throughout.

    '
- modality: chosen_approach
  fields:
    title: 'Structured innovation: three modes of experimentation'
    body_left:
    - 'Discovery-led: Identify viable opportunities where problems are unclear.'
    - 'Proof-led: Validate defined ideas within technical constraints.'
    - 'Optimisation-led: Improve known pain points with measurable baseline.'
    - Hypotheses defined for testable outcomes.
    - Stakeholders participate in defining problems and reviewing evidence.
    - Rapid learning and disposal of weak ideas.
    - Emphasis on feasibility within current estate.
    body_right:
    - Website is validation environment, not final product.
    - User-centred design and accessibility embedded.
    - Bilingual content and navigation improvements tested.
    - Evidence gathered through controlled experiments.
    - Decision to continue, adapt or stop based on results.
    - Outputs are practical and decision-oriented.
    - Measurement framework defines success metrics.
  notes: 'The innovation window is hypothesis-led, focusing on measurable outcomes.

    Three modes—discovery, proof, optimisation—are applied based on challenge type.

    Stakeholder involvement ensures decisions are grounded in operational reality.

    '
- modality: four_pillars
  fields:
    title: Four-phase innovation delivery model
    pillars:
    - title: Explore & Discover
      body: Define hypotheses from journeys and analytics; set success metrics.
    - title: Ideate & Co-create
      body: Run low-cost experiments and clickable prototypes with users.
    - title: Design & Build
      body: Refine candidates; integrate live data; test accessibility and usability.
    - title: Scale & Co-operate
      body: Consolidate evidence; produce decision-ready position for NRW.
    notes: The innovation window progresses through four phases, each generating evidence.
      The approach enables rapid learning, validation, and practical decision-making
      aligned to NRW objectives for usability and accessibility.
  notes: 'The innovation window progresses through four phases, each generating evidence.

    The approach enables rapid learning, validation, and practical decision-making.

    Outputs are aligned to NRW''s objectives for usability and accessibility.

    '
- modality: hypothesis_success_criteria
  fields:
    title: Innovation hypotheses and success measures
    body_left:
    - Navigation friction reduced via prototype testing.
    - Search relevance improved with metadata changes.
    - Accessibility barriers addressed through bilingual design.
    - Live and location-based information validated.
    - Content effectiveness measured by task completion.
    - User-centred design aligns to Digital Service Standard.
    - Stakeholder review ensures operational fit.
    body_right:
    - Usability and accessibility outcomes improved.
    - Evidence supports scaling or refinement decisions.
    - MVP components proven technically feasible.
    - Prioritised backlog for accessibility and content.
    - Measurement framework tracks search and task metrics.
    - Bilingual parity achieved in prototypes.
    - Constraints identified for future scaling.
  notes: 'Hypotheses are defined to test specific website improvements.

    Success is measured by usability, accessibility, and evidence of feasibility.

    Outputs inform practical next steps for NRW.

    '
- modality: learnings_constraints
  fields:
    title: Risks and mitigations in innovation window
    body_left:
    - Poorly defined objectives delay progress.
    - Limited user access for validation.
    - Technical and content constraints restrict feasibility.
    - Time pressure may limit experimentation.
    - Stakeholder engagement required for decision-making.
    - Potential for weak ideas to persist without evidence.
    - Measurement framework must be robust.
    body_right:
    - Early hypothesis definition clarifies objectives.
    - Stakeholder and user engagement secured upfront.
    - Feasibility testing addresses technical constraints.
    - Rapid learning and disposal of weak ideas.
    - Controlled experiments ensure evidence-based decisions.
    - Measurement framework aligns to success criteria.
    - Outputs are practical and decision-oriented.
  notes: 'Risks are managed through structured hypothesis definition, stakeholder
    engagement, and feasibility testing.

    The discipline to stop weak ideas protects time and investment.

    Measurement ensures outcomes are tracked and decisions are evidence-based.

    '
- modality: case_study
  fields:
    title: Stable — Welsh charity digital innovation
    body_left:
    - 'Challenge: Improve digital access for Welsh charities.'
    - 'Solution: User-centred, bilingual website prototypes.'
    - 'Approach: Rapid experimentation and stakeholder review.'
    - Accessibility and content effectiveness prioritised.
    - Knowledge transfer to charity teams.
    body_right:
    - 'Outcome: Enhanced usability and accessibility.'
    - Practical MVP components delivered.
    - Stakeholder engagement ensured operational fit.
    - Evidence-led scaling for future improvements.
    - Sustainable capability uplift for charity staff.
    image: assets/stable_logo.png
  notes: 'Stable''s experience with Welsh charities demonstrates practical innovation
    and capability uplift.

    The approach mirrors the innovation window proposed for NRW.

    Outcomes include improved usability, accessibility, and sustainable ownership.

    '
- modality: context_statement
  fields:
    title: Innovation window delivers measurable product improvements
    body:
    - 80% of hypotheses validated within 12 weeks (pilot cohort)
    - Prototype usability improved by 25% after testing
    - 'Accessibility compliance achieved: WCAG 2.2 AA'
    - 'Stakeholder satisfaction: 90% positive feedback'
    notes: Use the innovation window to validate, improve usability, and meet accessibility
      targets within 12 weeks, supported by strong stakeholder feedback.
  notes: 'Metrics illustrate the effectiveness of the innovation window approach.

    Validation, usability, accessibility, and stakeholder satisfaction are tracked.

    NRW can expect measurable improvement within the 12-week period.

    '
- modality: section_divider
  fields:
    title: 'Section 5: Sustainability & Social Value'
- modality: context_statement
  fields:
    title: Sustainability and social value embedded in delivery
  notes: 'Environmental sustainability and social value are central priorities for
    NRW.

    Our approach integrates these principles throughout digital delivery, not as add-ons.

    Practical benefit within Wales is prioritised.

    '
- modality: four_pillars
  fields:
    title: Four pillars of sustainability and social value
    pillars:
    - title: Environmental Sustainability
      body:
      - Cloud platforms reduce environmental impact and energy use.
      - FinOps and GreenOps practices track cost and carbon impact.
      - Service-level reporting and workload optimisation.
    - title: Social Value Delivery
      body:
      - Stable as Welsh-based partner supports local employment.
      - Internship pathways with local universities.
      - Welsh charities and SMEs actively engaged.
    - title: Skills Development & Community Engagement
      body:
      - Stable supports youth and skills initiatives.
      - DigiGirlz, Scouts, and school partnerships.
      - Promotes digital skills and career awareness.
    - title: Proportionate Performance Monitoring
      body:
      - KPIs, milestones, and transparent reporting.
      - 'Metrics: carbon impact, supplier participation, skills uplift.'
      - Continuous improvement and lasting impact.
  notes: 'Sustainability and social value are delivered through practical actions
    and structured monitoring.

    Local employment, skills development, and environmental outcomes are prioritised.

    Performance is tracked to ensure commitments are met.

    '
- modality: problem_framing
  fields:
    title: Social value commitments in practice
    body_left:
    - Stable prioritises Welsh-based teams for local benefit.
    - Works closely with Welsh SMEs and social enterprises.
    - Supports charities through time, expertise, and engagement.
    - Internship pathways enable talent retention.
    - Community engagement via youth and skills initiatives.
    - Social value scaled proportionately at call-off level.
    - Structured reporting ensures transparency.
    body_right:
    - Environmental governance arrangements maintained.
    - Carbon reduction plans and recognised practices.
    - Digital platforms support environmental outcomes directly.
    - Service-level reporting and workload optimisation.
    - Continuous improvement through baseline assessment.
    - Milestones and KPIs track progress and impact.
    - Lasting impact across Wales ensured.
  notes: 'Social value is delivered through local employment, skills, and charity
    engagement.

    Environmental sustainability is embedded in delivery and tracked through structured
    reporting.

    Commitments are scaled and monitored for lasting impact.

    '
- modality: context_statement
  fields:
    title: Measurable sustainability and social value delivered
    lead: In Welsh public sector programmes, IBM and Stable delivered outcomes that
      can be tracked and reported.
    proof_points:
    - Charities supported via digital transformation
    - Internship pathways retained local talent
    - Carbon reduction plans implemented
    - Skills uplift for youth and communities
    notes: Evidence shows measurable social value and sustainability, with transparent
      reporting and continuous improvement.
  notes: 'Evidence demonstrates our ability to deliver measurable social value and
    sustainability.

    Outcomes include charity support, talent retention, carbon reduction, and skills
    uplift.

    Performance is tracked and reported transparently.

    '
- modality: section_divider
  fields:
    title: 'Section 6: Commercial Approach'
- modality: context_statement
  fields:
    title: Flexible commercial models for value and transparency
  notes: 'IBM supports flexible commercial models tailored to NRW''s requirements.

    Pricing structures are designed for transparency, value, and scalability.

    Models evolve as requirement certainty increases.

    '
- modality: options_considered
  fields:
    title: Commercial options under the framework
    intro: We offer multiple pricing structures to suit different delivery stages
      and requirements.
    boxes:
    - 'Time and Materials: Flexible for discovery and evolving needs'
    - 'Fixed Price: Predictable where scope and outcomes are clear'
    - 'Fixed Capacity: Stable teams for controlled budget'
    - 'Supplier-led: Managed platforms and operational services'
    - 'Blended Delivery: Buyer and supplier teams for capability uplift'
  notes: 'Commercial options are selected based on maturity, certainty, and risk profile.

    Time and Materials suits discovery, Fixed Price for stable requirements, Fixed
    Capacity for agile delivery.

    Blended models enable capability transfer and shared accountability.

    '
- modality: problem_framing
  fields:
    title: Key commercial assumptions and volume discounts
    body_left:
    - Rate card reflects typical market roles for DDaT delivery.
    - Pricing exposes main cost drivers and assumptions.
    - Inclusive of all delivery costs and standard role definitions.
    - 8-hour working day and normal delivery environments.
    - Framework-level delivery assumptions applied.
    - Rates refined through call-off process if requirements differ.
    - Innovation fund contribution included.
    body_right:
    - Volume discounts for sustained delivery volumes.
    - Efficiencies achieved through team stability.
    - Reduced onboarding friction and longer-term planning.
    - Discounts passed via reduced blended rates.
    - Agreed discount structures for larger programmes.
    - Commercial approach aligns to market engagement response.
    - Phased models evolve as requirement certainty increases.
  notes: 'Commercial assumptions ensure transparency and realism.

    Volume discounts reward sustained delivery and efficiency.

    Models are refined as requirements evolve, supporting value for NRW.

    '
- modality: four_pillars
  fields:
    title: Equitable innovation fund principles
    pillars:
    - title: Transparent eligibility
      body: Clear criteria, submission steps, and documented requirements.
    - title: Balanced access
      body: Caps and prioritisation to broaden supplier participation.
    - title: Impact-based decisions
      body: Funding decisions tied to measurable outcomes and value.
    - title: Collaborative governance
      body: Shared proposals plus transparent governance and annual equity review.
  notes: 'Innovation fund management ensures contributors benefit equitably.

    Principles include transparent eligibility, balanced access, impact-based decisions,
    and collaborative proposals.

    Governance and periodic review maintain trust and value.

    '
- modality: section_divider
  fields:
    title: 'Section 7: Close & Next Steps'
- modality: next_steps
  fields:
    title: Proposed next steps for NRW and supplier teams
    body_left:
    - 'IBM: Issue final commercial proposal following feedback'
    - 'IBM: Schedule discovery kickoff workshop'
    - 'Stable: Confirm local team availability'
    - 'IBM & Stable: Mobilise blended delivery teams'
    - 'IBM: Share structured mobilisation and governance plan'
    - 'IBM: Provide detailed architectural artefacts'
    - 'Stable: Coordinate bilingual stakeholder engagement'
    body_right:
    - 'NRW: Confirm stakeholder availability for discovery'
    - 'NRW: Share system inventory and data dictionary'
    - 'NRW: Provide access to representative users'
    - 'NRW: Review and approve prioritised roadmap'
    - 'NRW: Agree success criteria and measurement framework'
    - 'NRW: Participate in knowledge transfer activities'
    - 'NRW: Set up governance and reporting structures'
  notes: 'Next steps ensure readiness for discovery and delivery mobilisation.

    Both supplier and NRW actions are required for smooth transition.

