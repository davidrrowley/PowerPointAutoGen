slides:
  - modality: context_statement
    fields:
      title: "Spreadsheet logic can be replatformed into Fabric without losing operational clarity"

  - modality: problem_framing
    fields:
      title: "A manual spreadsheet-driven process was becoming difficult to scale and govern"
      body:
        - "Business logic was embedded in spreadsheets rather than a managed execution layer"
        - "The process depended on manual handling before files could move into the data platform"
        - "Auditability and repeatability were weaker than the target operating model required"
        - "The question was whether Fabric notebooks could preserve the logic while improving control"

  - modality: hypothesis_success_criteria
    fields:
      title: "The PoC needed to prove both functional equivalence and platform suitability"
      body_left:
        - "Can the spreadsheet logic be translated into Python notebooks accurately?"
        - "Can the resulting process operate cleanly inside a Fabric and lakehouse pattern?"
      body_right:
        - "Can ingestion and downstream reasoning be made more repeatable?"
        - "Can the approach improve observability without introducing unnecessary complexity?"

  - modality: options_considered
    fields:
      title: "Several implementation paths existed, but they did not offer the same balance of control"
      body_left:
        - "Retain the spreadsheet as the core execution mechanism"
        - "Low change effort"
        - "But governance and automation remain constrained"
      body_right:
        - "Move the logic into Fabric notebooks backed by the lakehouse"
        - "More engineering effort up front"
        - "But stronger repeatability, visibility and integration potential"

  - modality: chosen_approach
    fields:
      title: "The chosen approach moved logic into Python notebooks while keeping ingestion disciplined"
      body:
        - "The spreadsheet process was treated as logic to be translated rather than simply automated around"
        - "Fabric notebooks became the execution layer for that logic"
        - "The surrounding flow was designed to support controlled ingestion into the lakehouse"

  - modality: architecture_view
    fields:
      title: "Architecture: spreadsheet ingestion and notebook-driven execution in Fabric"
      body:
        - "Files are prepared and moved into a governed ingestion path"
        - "Python notebooks execute the translated business logic inside Fabric"
        - "Outputs land in the lakehouse ready for downstream reasoning and reporting"
      image: "example_architecture.png"

  - modality: evidence_results
    fields:
      title: "The PoC proved the logic could move into Fabric cleanly"
      body:
        - "A meaningful representation of the spreadsheet process was implemented in Python notebooks"
        - "The Fabric environment proved viable as the execution surface for the translated logic"
        - "The resulting pattern aligned better with a repeatable ingestion and processing model"
        - "The flow created a stronger foundation for later automation and reporting"

  - modality: learnings_constraints
    fields:
      title: "The main lessons were about process discipline and hidden dependency, not notebook feasibility"
      body:
        - "The hard part was not notebook execution but surfacing the implicit assumptions held in the spreadsheet"
        - "Human intervention remained useful at the ingestion boundary where source quality varied"
        - "Folder and metadata handling mattered more than expected in making the flow reliable"
        - "A controlled trigger point was preferable to trying to automate around partially prepared inputs"

  - modality: implications
    fields:
      title: "The outcome supports a broader move from spreadsheet operations to platform-managed execution"
      body:
        - "The logic no longer needs to remain trapped inside a manually operated spreadsheet"
        - "Fabric can act as both an execution environment and a bridge into more governed data handling"
        - "Future automation should focus on reliable ingestion conditions rather than forcing full end-to-end autonomy"

  - modality: next_steps
    fields:
      title: "The next step is to operationalise the pattern rather than prove the basic mechanics again"
      body_left:
        - "Refine the ingestion trigger and metadata controls"
        - "Harden the notebook pattern for repeatable execution"
      body_right:
        - "Extend the lakehouse outputs for downstream reasoning"
        - "Connect the flow into reporting and broader automation"