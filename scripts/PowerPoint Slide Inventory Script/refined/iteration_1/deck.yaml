slides:
- modality: title_slide
  fields:
    title: IBM + Stable Proposal for NRW DDaT Framework
    subtitle: Delivering digital transformation for Natural Resources Wales
    notes: Welcome and introductions. This presentation sets out the IBM and Stable
      joint response to the NRW DDaT framework opportunity. We will cover our proposition,
      delivery approach, and commercial model.
  notes: 'Welcome and introductions. This presentation sets out the IBM and Stable
    joint response to the NRW DDaT framework opportunity. We will cover our proposition,
    delivery approach, and commercial model.

    '
- modality: index_slide
  fields:
    title: Agenda for today
    sections:
    - Introductions & joint proposition
    - Strengths & differentiators
    - Scenario 1: Customer Platform
    - Scenario 2: Innovation Window
    - Sustainability, commercial & Q&A
- modality: chosen_approach
  fields:
    title: 'Joint proposition: scale with local, sustainable capability'
    body:
    - IBM+Stable blended delivery: proven transformation at scale
    - NRW alignment: customer experience and data maturity
    - Sustainable capability uplift built into delivery outcomes
    - Team Wales: bilingual Welsh-based execution and local accountability
    notes: 'IBM brings enterprise-grade DDaT and Microsoft ecosystem expertise. Stable
      brings bilingual local delivery and stakeholder relationships. Together: scale,
      sustainability, and accountability for NRW.'
  notes: 'IBM brings enterprise-grade DDaT capability and deep Microsoft ecosystem
    expertise. Stable brings Welsh-based bilingual delivery and strong local stakeholder
    relationships. Together the proposition is greater than the sum of its parts —
    addressing NRW''s need for scale, sustainability and local accountability.

    '
- modality: problem_framing
  fields:
    title: IBM brings end-to-end DDaT capability to NRW
    body:
    - End-to-end DDaT: discovery, design, engineering, data, and operations
    - Deep Microsoft ecosystem: Dynamics 365, Power Platform, Azure, Fabric
    - Proven in complex, regulated, multi-supplier environments
    - Structured delivery via IBM Digital Product Design and Engineering
    - Integrated architecture, data, and product approach
- modality: learnings_constraints
  fields:
    title: Our differentiators in delivery
    body:
    - Team Wales model: stable, embedded, bilingual Welsh capability
    - Capability uplift built into delivery from day one
    - Product-led delivery with governance, audit traceability
    - Evidence-based decisions to avoid early over-commitment
- modality: context_statement
  fields:
    title: Unified customer experience across NRW services & channels
    body:
    - One view of the customer, consistent journeys, and seamless service delivery
- modality: options_considered
  fields:
    title: Three parallel tracks to shape an evidence-based roadmap
    body_left:
    - User & stakeholder discovery
    - Technical & architectural assessment
    - Commercial & delivery framing
    body_right:
    - Runs concurrently over 18–24 months
    - Produces an evidence-based roadmap and investment business case
- modality: implications
  fields:
    title: Evidence-to-decision traceability de-risks investment
    body:
    - Trace user needs to architecture, then to commercial choices
    - Validate assumptions on scale, complexity, and technical readiness
    - Prioritise a staged roadmap for proportionate, timely investment
    - Sequence delivery to confirm feasibility before commitment
- modality: architecture_view
  fields:
    title: Four-layer architecture for the NRW customer platform
    body:
    - Customer Engagement: portals, web, content, bilingual interfaces
    - CRM & Service Management: Dynamics 365 as the system of action
    - Integration & Platform Services: Azure API, orchestration, events
    - Data & Insights: governed Azure and Fabric data services
- modality: learnings_constraints
  fields:
    title: Five architectural principles for platform design
    body:
    - Cloud-first, SaaS-preferred: minimize custom build
    - API-first & event-driven: decouple for interoperability
    - Governed data: lineage, ownership, and access controls
    - Secure-by-design: compliant across layers and environments
    - Modular & loosely coupled: avoid legacy lock-in
- modality: chosen_approach
  fields:
    title: Dynamics 365, Power Platform, and Azure as platform building blocks
    body:
    - 'Dynamics 365: authoritative customer domain and system of action'
    - 'CMS and SharePoint: structured content, publishing, and knowledge'
    - 'Azure Integration: decoupled data movement and orchestration layer'
    - 'Data platform: trusted, discoverable, reusable customer and operational data'
- modality: problem_framing
  fields:
    title: Data fragmentation limits NRW integration
    body:
    - Canonical customer ID model to unify records progressively
    - Progressive unification—avoid big-bang consolidation across systems
    - Map and match legacy data to reduce duplicates
    - Event-driven updates for near real-time consistency
- modality: learnings_constraints
  fields:
    title: Data sequencing & lifecycle risks
    body:
    - Early: identity model, APIs, event layer foundations
    - Mid: deduplication, survivorship rules, governance processes
    - Long: controlled consolidation across legacy systems
    - Risks: data quality, legacy dependencies, ownership clarity
- modality: strategy
  fields:
    title: Multidisciplinary delivery model with product teams
    body:
    - Discovery: multidisciplinary, hypothesis-led, time-boxed
    - Product teams run Alpha, Beta, and Live phases
    - IBM, Stable, NRW capabilities embedded throughout
    - Ownership and skills progressively transition to NRW
- modality: chosen_approach
  fields:
    title: Three-tier governance for delivery
    body:
    - Strategic: alignment, prioritisation, stakeholder confidence
    - Programme: milestones, budget, dependencies, risk tracking
    - Technical: standards, security, architectural consistency
    - Risk management embedded across all delivery cycles
- modality: learnings_constraints
  fields:
    title: Security, testing, and operational sustainability by design
    body:
    - Security-by-design: zero-trust principles and early threat modelling
    - Proportionate testing: automated, performance, and penetration coverage
    - Observability, resilience, and runbooks from day one
    - NRW capability transfer: skills, knowledge, and tooling ownership
- modality: problem_framing
  fields:
    title: Blended resourcing model for Wales delivery
    body:
    - IBM capability: architecture, engineering, data, security, product
    - Stable Team Wales: Welsh-based partner for local delivery strength
    - Hybrid delivery: on-site and remote collaboration across Wales
    - NRW staff embedded to drive knowledge transfer
- modality: context_statement
  fields:
    title: A 12-week hypothesis-led window to generate evidence not production builds
- modality: options_considered
  fields:
    title: Innovation modes matched to clarity and readiness
    body_left:
    - Discovery-led: explore unclear or poorly defined problems
    - Proof-led: test feasibility within known constraints
    - Optimisation-led: improve well-understood pain points
    body_right:
    - All modes use measurable, agreed hypotheses
    - Select mode based on problem definition and context
- modality: four_pillars
  fields:
    title: Four phases of the 12-week innovation programme
    pillars:
    - title: Phase 1 — Explore & Discover
      body: Journeys, data, content, accessibility
    - title: Phase 2 — Ideate & Co-create
      body: Prototypes, experiments, bilingual review
    - title: Phase 3 — Build & Co-execute
      body: Technical feasibility and integration
    - title: Phase 4 — Scale & Decide
      body: Evidence packs and investment recommendations
- modality: chosen_approach
  fields:
    title: Outputs from the 12-week innovation window
    body:
    - Bilingual IA & navigation prototypes; user-tested journey evidence
    - Search improvements + reusable bilingual content patterns
    - Accessibility & WCAG upgrades; documented audit trail
    - Journey prototypes + feasibility evidence for live data integration
    - Prioritised backlog and investment decision evidence pack
- modality: learnings_constraints
  fields:
    title: Key risks and mitigations for the innovation window
    body:
    - Hypothesis clarity — must be agreed and baselined at programme start
    - Access to users and content owners sustained across all four phases
    - CMS and platform constraints limiting technical feasibility scope
    - 'Managing expectations: output is evidence and prototypes, not production'
- modality: implications
  fields:
    title: Embed sustainability in our digital delivery model
    body:
    - Use GreenOps and FinOps for carbon-aware cloud consumption
    - Optimize resource allocation and environment lifecycle efficiency
    - Deliver digital solutions that support NRW environmental insight objectives
    - Align to NRW sustainability goals and net-zero commitments
- modality: implications
  fields:
    title: Social value commitments through Stable and IBM in Wales
    body:
    - Stable: Welsh-based SME driving direct local employment impact
    - Internships, skills programmes, and university partnerships across Wales
    - Support for Welsh charities and local digital communities
    - Commitments scaled proportionately at call-off stage
- modality: strategy
  fields:
    title: Commercial model options for discovery-first delivery
    body:
    - Time & Materials for discovery and shaping phases
    - Fixed price or fixed capacity for defined delivery scope
    - Rate card assumptions with transparent volume discount principles
    - Volume efficiencies for sustained and expanded engagement
- modality: context_statement
  fields:
    title: 'IBM and Stable: outcomes-led, evidence-based for NRW'
- modality: closing_slide
  fields:
    title: Thank you — Questions & discussion
    body:
    - We welcome challenge and questions on any area of today’s proposal
    footer_accent: IBM Consulting | Q&A
