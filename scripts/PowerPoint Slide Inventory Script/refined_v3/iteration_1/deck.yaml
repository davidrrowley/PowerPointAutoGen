slides:
- modality: title_slide
  fields:
    title: NRW DDaT Framework — Initial Proposal
    subtitle: IBM Consulting & Stable — Supplier Response
  notes: 'Welcome to the NRW DDaT Framework initial proposal. This deck presents IBM
    Consulting and Stable''s joint response, covering our differentiators, capabilities,
    approach to the Customer Platform and Website Innovation, sustainability, commercial
    model, and next steps.

    '
- modality: index_slide
  fields:
    title: Agenda
    sections:
    - 1. Our Joint Proposition
    - 2. Customer Capabilities
    - '3. Scenario 1: Customer Platform'
    - '4. Scenario 2: Website Innovation'
    - 5. Sustainability & Social Value
    - 6. Commercial Approach
    - 7. Close & Next Steps
  notes: 'Outline the structure of the presentation. Each section will address key
    aspects of our proposal, from joint delivery strengths to commercial terms and
    sustainability commitments.

    '
- modality: section_divider
  fields:
    title: 'Section 1: Our Joint Proposition'
    subtitle: Aligning strategy, value, and execution
- modality: context_statement
  fields:
    title: IBM and Stable deliver scale, local expertise, and sustainable capability
    body:
    - IBM brings global delivery scale and specialist expertise
    - Stable adds Welsh-based architectural and engineering talent
    - NRW benefits from continuity and leading practices
    notes: Our partnership combines IBM's global delivery scale and specialist expertise
      with Stable's Welsh-based architectural and engineering talent. This blend ensures
      NRW benefits from both continuity and access to leading practices.
  notes: 'Our partnership combines IBM''s global delivery scale and specialist expertise
    with Stable''s Welsh-based architectural and engineering talent. This blend ensures
    NRW benefits from both continuity and access to leading practices.

    '
- modality: four_pillars
  fields:
    title: Four differentiators of our joint delivery model
    columns:
    - Integrated transformation from strategy to live service
    - Local Welsh presence and bilingual engagement
    - Continuous knowledge transfer and capability uplift
    - Structured governance and delivery momentum
  notes: 'These pillars distinguish our approach from typical suppliers. We embed
    local teams, transfer knowledge proactively, and ensure delivery is governed yet
    agile, supporting NRW''s goals for resilience and sustainable change.

    '
- modality: problem_framing
  fields:
    title: Why NRW needs a blended delivery model
    body_left:
    - Complex, regulated environment demands structured methods
    - Multi-stakeholder context requires local engagement
    - Operational resilience must be maintained during change
    body_right:
    - Capability uplift ensures sustainable transformation
    - Integrated teams accelerate delivery and reduce risk
    - Bilingual requirements addressed by local expertise
  notes: 'NRW''s transformation requires more than resource augmentation. Our blended
    model leverages local insight and global capability, ensuring both operational
    continuity and scalable delivery.

    '
- modality: chosen_approach
  fields:
    title: Team Wales — practical blended delivery
    body_left:
    - 'Stable: Welsh-based delivery partner'
    - Local architectural and engineering expertise
    - Deep ties to Welsh communities and public sector
    - Bilingual engagement and continuity
    body_right:
    - 'IBM: global scale and specialist accelerators'
    - Structured integration with IBM-led teams
    - Knowledge transfer embedded in delivery
    - Joint governance and shared accountability
    - 'Outcome: sustainable capability for NRW'
  notes: 'The Team Wales model is more than subcontracting. Stable is fully integrated,
    providing local presence and cultural alignment, while IBM brings specialist resources
    and delivery scale.

    '
- modality: section_divider
  fields:
    title: 'Section 2: Customer Capabilities'
    subtitle: Capabilities that enable value delivery
- modality: four_pillars
  fields:
    title: IBM core strengths within the DDaT Framework
    columns:
    - End-to-end digital, data and technology delivery
    - Structured engineering, product and design disciplines
    - Experience in complex, regulated environments
    - Sustainable capability building and knowledge transfer
  notes: 'IBM''s strengths are rooted in delivering complex programmes across public
    sector and regulated domains. We combine technical depth with proven methods for
    capability uplift and governance.

    '
- modality: four_pillars
  fields:
    title: Six specialisms across the DDaT lifecycle
    pillars:
    - title: Digital Service Design
      body: User-centred, inclusive, outcome-driven
    - title: Data, Analytics & AI
      body: Governed platforms, predictive insights
    - title: Platforms & Integration
      body: Modular, API-led architectures
    - title: Cloud & DevOps
      body: Secure hybrid, FinOps, resilience
  notes: 'Our specialisms span the full DDaT lifecycle, from service design to cloud
    engineering and agile delivery. Each area is aligned to NRW''s requirements for
    modernisation and operational resilience.

    '
- modality: operating_model
  fields:
    title: Integrated delivery operating model
    columns:
    - 'Strategic governance: alignment to priorities'
    - 'Programme governance: milestones and risk'
    - 'Technical governance: standards and assurance'
    - 'Embedded risk management: proactive mitigation'
  notes: 'Governance is structured at multiple levels to ensure strategic alignment,
    technical consistency, and proactive risk management. This model supports NRW''s
    need for controlled, scalable delivery.

    '
- modality: evidence_results
  fields:
    title: Proven outcomes delivering DDaT at pace
    lead: IBM and Stable delivered successful programmes for UK public sector clients.
    proof_points:
    - 'Environment Agency: unified data platform in 11 months'
    - 'DVLA: 30% faster data processing'
    - 'Welsh charities: bilingual digital services'
    - 'NHS Digital: 18-month integration programme'
    notes: Track record across regulated environments and Welsh public sector clients.
      Outcomes validate delivery approach and methods.
  notes: 'Our track record demonstrates capability to deliver at scale, including
    regulated environments and Welsh public sector clients. These outcomes validate
    our approach and methods.

    '
- modality: section_divider
  fields:
    title: 'Section 3: Scenario 1 — Customer Platform'
    subtitle: Platform capabilities, integration, and outcomes
- modality: chosen_approach
  fields:
    title: Discovery and shaping approach for Customer Platform
    body_left:
    - Blended IBM and Stable team embedded with NRW
    - 'Three parallel activities: user, technical, commercial'
    - Discovery as mobilisation and shaping
    - Stakeholder engagement and operational context
    body_right:
    - User research, service mapping, analytics
    - Technical assessment of Microsoft ecosystem
    - Commercial and delivery sequencing
    - Evidence-based investment decisions
  notes: 'Discovery is structured to establish a clear roadmap, validate user needs,
    and ground investment decisions in technical and delivery evidence. Local engagement
    ensures relevance and continuity.

    '
- modality: four_pillars
  fields:
    title: Discovery outputs — foundation for platform evolution
    columns:
    - Prioritised 18–24 month service roadmap
    - Architectural direction aligned to Microsoft estate
    - Platform capability model and integrations
    - Sequenced delivery plan and mobilisation
  notes: 'The discovery phase delivers actionable artefacts, aligning platform evolution
    to NRW''s outcomes and ensuring traceability from user needs to investment decisions.

    '
- modality: architecture_view
  fields:
    title: Foundational architecture for NRW on the Microsoft ecosystem
    body:
    - 'Layer 1: Engagement'
    - 'Layer 2: CRM (Dynamics 365 as authoritative domain)'
    - 'Layer 3: Integration (Azure orchestration, API-first)'
    - 'Layer 4: Data (analytics and insights)'
    image: assets/customer_platform_architecture.png
  notes: 'The architecture organises NRW''s Microsoft estate into cohesive layers,
    supporting modularity, API-first integration, and incremental modernisation. This
    structure reduces coupling and supports future change.

    '
- modality: four_pillars
  fields:
    title: Key architectural principles for platform evolution
    columns:
    - Cloud-first, SaaS-preferred, managed services
    - Modularity and loose coupling
    - API-first and event-driven patterns
    - Data governance, security and privacy by design
  notes: 'These principles guide architectural decisions, ensuring scalability, resilience,
    and compliance. They reinforce separation of concerns and enable NRW to evolve
    the platform incrementally.

    '
- modality: problem_framing
  fields:
    title: Addressing customer data fragmentation
    columns:
    - Inconsistent records across systems
    - Disconnected data flows between platforms
    - Fragmented user journeys
    - Lack of real-time, coherent customer view
  notes: 'NRW faces three forms of data fragmentation. Our approach resolves these
    progressively, focusing on identity-led integration and unified customer records.

    '
- modality: chosen_approach
  fields:
    title: Data integration and platform thinking
    body_left:
    - Map customer data across CRM, legacy, GIS, documents
    - Introduce shared customer identifier model
    - Dynamics 365 as master customer record
    - API-based integration for real-time data
    body_right:
    - Controlled consolidation via MDM and survivorship rules
    - Azure-native data platform for analytics
    - Validate assumptions during discovery
    - Sequenced delivery to manage risk
  notes: 'We establish a governed integration framework, resolving identity and data
    fragmentation through incremental steps. Discovery validates feasibility and readiness
    before wider implementation.

    '
- modality: learnings_constraints
  fields:
    title: Key risks and mitigations for data integration
    body_left:
    - Poor data quality reduces matching accuracy
    - Hidden dependencies in legacy systems
    - Integration performance and security constraints
    - Inconsistent ownership of customer data
    body_right:
    - Structured data profiling and validation
    - Integration layer wraps existing systems
    - API-driven connectivity with strong governance
    - Early identity resolution and risk-based sequencing
    notes: Risks are managed proactively through profiling, governance, and incremental
      delivery. Adoption and stakeholder engagement are critical.
  notes: 'Risks are managed proactively through structured profiling, governance,
    and incremental delivery. Organisational adoption and stakeholder engagement are
    critical to success.

    '
- modality: operating_model
  fields:
    title: Multidisciplinary delivery team structure
    columns:
    - Service designers, business analysts, architects
    - Platform engineers, data specialists, product managers
    - UX researchers, security specialists
    - Blended IBM/Stable teams with NRW staff
  notes: 'Teams are designed for cross-functional collaboration, combining technical
    and operational expertise. NRW staff are embedded to accelerate knowledge transfer
    and build sustainable capability.

    '
- modality: strategy
  fields:
    title: Phased scaling and maturity pathway
    points:
    - 'Alpha: pilot teams, validate assumptions'
    - 'Beta: expand, frequent iterations'
    - 'Live: sustainable mix, maintenance and operations'
    - 'Retire: decommissioning with user engagement'
  notes: 'Scaling follows a risk-based, phased approach. Early involvement of sustainment
    resources ensures smooth transition to live operation and long-term platform sustainability.

    '
- modality: hypothesis_success_criteria
  fields:
    title: Security, testing and service sustainability
    body_left:
    - Security, privacy and compliance embedded from outset
    - Structured threat modelling and compliance analysis
    - Proportionate testing and assurance
    - Live-service operability as primary design consideration
    - Knowledge transfer and capability uplift
    body_right:
    - Alignment with UK GDPR, Cyber Essentials Plus
    - Enhanced assurance for high-risk components
    - Continuous monitoring and resilience
    - Progressive transition to NRW ownership
    - In-house team sustains and evolves platform
  notes: 'Security and compliance are integral to design and delivery. Testing is
    risk-based, and operability is prioritised. Knowledge transfer ensures NRW can
    sustain and improve services independently.

    '
- modality: section_divider
  fields:
    title: 'Section 4: Scenario 2 — Website Innovation Window'
    subtitle: Timeboxed opportunity to test, learn, and scale
- modality: context_statement
  fields:
    title: '12-week innovation window: test website improvements with evidence'
    body:
    - Structured experiment, not a mini-project
    - Validate usability, accessibility, and service outcomes
    - Within NRW constraints
  notes: 'The innovation window is a structured experiment, not a mini-project. It
    aims to validate changes that improve usability, accessibility, and service outcomes
    within NRW''s constraints.

    '
- modality: four_pillars
  fields:
    title: Three innovation modes for website improvement
    columns:
    - 'Discovery-led: identify viable opportunities'
    - 'Proof-led: validate defined ideas'
    - 'Optimisation-led: improve known pain points'
    - Rapid learning and evidence-driven decisions
  notes: 'The approach adapts to the nature of each challenge, focusing on evidence
    generation and disciplined disposal of weak ideas. Stakeholder involvement is
    continuous.

    '
- modality: strategy
  fields:
    title: Four phases of evidence generation
    points:
    - 'Explore & Discover: define hypotheses'
    - 'Ideate/Co-create: low-cost experimentation'
    - 'Design & Build/Co-execute: deepen prototypes'
    - 'Scale/Co-operate: consolidate evidence, decide next steps'
  notes: 'Each phase builds on the previous, moving from problem definition to evidence-based
    decision making. The process is hypothesis-led and supports rapid learning.

    '
- modality: hypothesis_success_criteria
  fields:
    title: Hypothesis-led approach and success criteria
    body_left:
    - Define explicit hypotheses linked to user problems
    - Design lightweight experiments
    - Run controlled tests and gather evidence
    - Stakeholders review and decide
    body_right:
    - Measurable improvement in usability and accessibility
    - Validated design and content patterns
    - Evidence-led search and navigation enhancements
    - Decision-ready outputs for scaling or cessation
  notes: 'Success is measured by evidence, not opinion. The approach ensures only
    feasible, valuable changes progress, supporting NRW''s objectives for user-centred,
    bilingual, accessible services.

    '
- modality: evidence_results
  fields:
    title: Innovation window outputs (what we delivered)
    body:
    - Validated hypotheses and reusable design patterns
    - Navigation and information architecture prototypes
    - Evidence-led search improvements
    - End-to-end prototypes for priority journeys
    - Accessibility and content improvement backlog
    - Proof of feasibility for live data integration
    - Measurement framework for success metrics
    notes: Deliverables are practical and decision-oriented, giving NRW actionable
      artefacts and evidence to guide future website improvements.
  notes: 'Deliverables are practical and decision-oriented, providing NRW with actionable
    artefacts and evidence to inform future website improvements.

    '
- modality: learnings_constraints
  fields:
    title: Key risks, dependencies and assumptions
    body_left:
    - Poorly defined objectives
    - Limited user access
    - Technical and content constraints
    - Time-limited innovation window
    - Stakeholder engagement required
    body_right:
    - Early hypothesis definition
    - Upfront stakeholder and user engagement
    - Feasibility testing before scaling
    - Disciplined disposal of weak ideas
    - Clear measurement and reporting
  notes: 'Risks are managed through structured engagement, early testing, and evidence-led
    decision making. Assumptions include access to users, analytics, and technical
    constraints.

    '
- modality: section_divider
  fields:
    title: 'Section 5: Sustainability & Social Value'
    subtitle: How we deliver measurable impact
- modality: four_pillars
  fields:
    title: Embedding sustainability and social value in delivery
    columns:
    - Environmental impact reduction via cloud platforms
    - FinOps and GreenOps for cost and carbon visibility
    - Local employment and skills development
    - Welsh SME and social enterprise engagement
  notes: 'Sustainability and social value are integral to our delivery. We leverage
    cloud efficiencies, support local talent, and actively engage Welsh SMEs and charities.

    '
- modality: chosen_approach
  fields:
    title: Stable's social value impact in Wales
    body_left:
    - Welsh-based teams supporting local employment
    - Internship pathways with local universities
    - Community engagement with charities
    - Youth and skills initiatives
    body_right:
    - Partnerships with Welsh SMEs and social enterprises
    - Bilingual service delivery
    - Digital skills promotion in schools
    - Structured reporting and measurable outcomes
  notes: 'Stable''s commitment to social value is demonstrated through practical actions—internships,
    charity support, and skills initiatives. These efforts are tracked and reported
    for transparency.

    '
- modality: evidence_results
  fields:
    title: Monitoring sustainability and social value performance
    body:
    - 'KPIs: carbon impact, supplier participation, skills uplift'
    - Structured reporting aligned to framework governance
    - Commitments scaled to engagement size
    - Continuous improvement with transparent outcomes
  notes: 'Performance is monitored through clear metrics and reporting. Commitments
    are scaled to engagement size, ensuring lasting impact across Wales.

    '
- modality: section_divider
  fields:
    title: 'Section 6: Commercial Approach'
    subtitle: Go-to-market, pricing, and partnership strategy
- modality: options_considered
  fields:
    title: Flexible commercial models for DDaT delivery
    intro: IBM supports multiple pricing approaches to suit requirement maturity and
      delivery stage.
    boxes:
    - 'Time and Materials: flexible for discovery phases'
    - 'Fixed Price: predictable for stable requirements'
    - 'Fixed Capacity: balanced agility and cost certainty'
    - 'Supplier-led: managed platforms and operational services'
    - 'Blended delivery: buyer and supplier teams'
  notes: 'Our commercial approach provides NRW with flexibility and transparency.
    Models are selected based on requirement certainty, risk, and delivery needs.

    '
- modality: problem_framing
  fields:
    title: Key assumptions underpinning rate card and discounts
    body:
    - Standard role definitions and inclusive delivery costs
    - 8-hour working day, normal delivery environments
    - Innovation fund contribution included
    - Rates refined at call-off for specialist needs
    - Volume discounts for sustained delivery
    - Transparent cost drivers and assumptions
  notes: 'Pricing is structured for clarity and realism. Volume discounts reward sustained
    engagement, and models adapt to specialist requirements as needed.

    '
- modality: learnings_constraints
  fields:
    title: Innovation fund principles and governance
    body_left:
    - Clear and transparent eligibility
    - Balanced access to funds
    - Impact-based funding decisions
    - Support for collaborative innovation
    - Annual equity and value review
    body_right:
    - Joint governance group with customer oversight
    - Visible criteria, scoring and rationale
    - Periodic review and adjustment
    - Structured participation and open outcomes
    - Maximising customer and supplier benefit
  notes: 'The innovation fund is governed transparently, ensuring fair access and
    impact across contributors. Collaborative proposals and periodic reviews maintain
    trust and value.

    '
- modality: section_divider
  fields:
    title: 'Section 7: Close & Next Steps'
    subtitle: Align on outcomes, confirm actions, and move forward
- modality: next_steps
  fields:
    title: 'Next steps: mobilise NRW and supplier discovery'
    body_left:
    - 'IBM: issue final commercial proposal'
    - 'IBM: schedule discovery kickoff workshop'
    - 'Stable: confirm Welsh-based delivery team availability'
    - 'IBM/Stable: prepare onboarding materials'
    body_right:
    - 'NRW: confirm stakeholder availability'
    - 'NRW: share system inventory and data dictionary'
    - 'NRW: agree innovation window hypotheses'
    - 'NRW: review sustainability and social value KPIs'
    notes: Mobilise quickly with clear ownership across discovery, onboarding, and
      KPI alignment.
  notes: 'Next steps focus on mobilisation, stakeholder engagement, and alignment
    on discovery and innovation activities. Early preparation supports smooth delivery
    initiation.

    '
- modality: closing_slide
  fields:
    title: Thank you
    subtitle: Questions welcome
    contact:
    - Dave Aspden | Stable CEO | dave@stable.co.uk
    - Phil Davenport | IBM Client Delivery Partner | philip.davenport@ibm.com
    - David Rowley | IBM Microsoft Practice CTO | david.rowley@ibm.com
    - Ryan Lewis | Stable CTO/MD | ryan@stable.co.uk
    notes: Contact details provided for follow-up. We welcome questions and discussion.
  notes: 'Contact details for the presentation attendees are provided for follow-up.
    We welcome questions and further discussion on the proposal.

    '
- modality: ibm_sign_off
  fields: {}
