slides:
  - modality: title_slide
    fields:
      title: "NRW DDaT Framework Initial Proposal Presentation"
      subtitle: "IBM Consulting and Stable Joint Delivery Approach"

  - modality: index_slide
    fields:
      title: "Agenda"
      sections:
        - "1. Introductions and Context"
        - "2. Understanding of NRW Requirements"
        - "3. Clarifications on Our Proposal"
        - "4. Customer Platform Approach"
        - "5. Delivery Model and Governance"
        - "6. Website Innovation Approach"
        - "7. Sustainability and Social Value"
        - "8. Commercial Approach"
        - "9. Questions and Discussion"

  - modality: section_divider
    fields:
      title: "Section 1: Introductions and Context"

  - modality: four_pillars
    fields:
      title: "Purpose of this session"
      columns:
        - "Clarify key aspects of our initial proposal submission"
        - "Demonstrate our understanding of NRW priorities and constraints"
        - "Walk through our delivery approach and capability"
        - "Provide transparency on how we would mobilise and deliver"

  - modality: context_statement
    fields:
      title: "Our proposal is designed to balance transformation ambition with operational control"

  - modality: section_divider
    fields:
      title: "Section 2: Our Understanding of NRW Requirements"

  - modality: strategy
    fields:
      title: "We understand NRW is operating within a complex environment"
      points:
        - "Multiple systems supporting customer, environmental and operational services"
        - "Fragmented customer data across platforms and services"
        - "Need to modernise without disrupting live service delivery"
        - "Strong governance, regulatory and sustainability expectations"

  - modality: four_pillars
    fields:
      title: "Key outcomes NRW is seeking"
      columns:
        - "A coherent customer platform supporting consistent journeys"
        - "Improved data maturity and trusted insight for decision making"
        - "Reduced operational complexity and improved integration"
        - "Sustainable internal capability alongside delivery outcomes"

  - modality: chosen_approach
    fields:
      title: "Typical patterns we see in similar organisations"
      body_left:
        - "Customer data fragmented across CRM, case systems and documents"
        - "Integration achieved through point to point connections"
      body_right:
        - "Limited visibility of end to end user journeys"
        - "High manual effort to reconcile and validate information"

  - modality: chosen_approach
    fields:
      title: "What this means for NRW"
      body_left:
        - "Transformation must be phased and evidence led"
        - "Architecture needs to enable incremental change not replacement"
      body_right:
        - "Data integration must precede data consolidation"
        - "Capability uplift must be embedded within delivery"

  - modality: section_divider
    fields:
      title: "Section 3: Clarifications on Our Proposal"

  - modality: four_pillars
    fields:
      title: "Clarifying our blended delivery model with Stable"
      columns:
        - "Stable is embedded within IBM delivery teams not a peripheral supplier"
        - "Provides local Welsh capability and continuity of engagement"
        - "Supports bilingual and user centred service delivery"
        - "Combined model balances scale with local responsiveness"

  - modality: chosen_approach
    fields:
      title: "Clarifying our transformation approach"
      body_left:
        - "Not a single programme delivery but a product aligned evolution"
        - "Focus on controlled, iterative delivery with measurable outcomes"
      body_right:
        - "Strong emphasis on governance, traceability and assurance"
        - "Continuous knowledge transfer to reduce dependency"

  - modality: hypothesis_success_criteria
    fields:
      title: "Clarifying our use of Microsoft ecosystem"
      body_left:
        - "Build on existing investment in Azure, Dynamics and Microsoft 365"
        - "Prioritise SaaS and managed services over bespoke build"
      body_right:
        - "Use platform capabilities before introducing custom solutions"
        - "Ensure alignment with existing estate and operating model"

  - modality: section_divider
    fields:
      title: "Section 4: Customer Platform Approach"

  - modality: strategy
    fields:
      title: "We propose a structured discovery led platform evolution"
      points:
        - "Discovery phase establishes roadmap, architecture and investment logic"
        - "Parallel focus on users, technology and delivery model"
        - "Outputs support staged and evidence based decision making"
        - "Foundation for long term product aligned delivery"

  - modality: chosen_approach
    fields:
      title: "Discovery structured across three parallel workstreams"
      body_left:
        - "User and stakeholder discovery to identify priority journeys"
        - "Technical and architectural assessment of current estate"
      body_right:
        - "Commercial and delivery shaping for phased execution"

  - modality: strategy
    fields:
      title: "Target customer platform architecture within Microsoft ecosystem"
      points:
        - "Customer engagement layer using portals, CMS and content platforms"
        - "Dynamics 365 as authoritative customer and service domain"
        - "Azure integration services enabling API and event driven connectivity"
        - "Governed data platform supporting analytics and insight"

  - modality: four_pillars
    fields:
      title: "Core architectural principles"
      columns:
        - "Cloud first and SaaS preferred with minimal bespoke infrastructure"
        - "Modular and loosely coupled architecture across all layers"
        - "API first and event driven integration patterns"
        - "Data governed with clear ownership lineage and access control"

  - modality: strategy
    fields:
      title: "Approach to resolving customer data fragmentation"
      points:
        - "Establish shared customer identifier anchored in Dynamics 365"
        - "Use integration layer to map and reconcile existing identifiers"
        - "Avoid immediate consolidation to reduce delivery risk"
        - "Progressively improve data quality and consistency over time"

  - modality: chosen_approach
    fields:
      title: "Sequencing and risk management approach"
      body_left:
        - "Prioritise identity resolution and integration early"
        - "Maintain existing systems while improving interoperability"
      body_right:
        - "Introduce consolidation only when data confidence improves"
        - "Mitigate risk through incremental delivery and validation"

  - modality: section_divider
    fields:
      title: "Section 5: Delivery Model and Governance"

  - modality: four_pillars
    fields:
      title: "Multidisciplinary delivery model"
      columns:
        - "Teams include design, architecture, engineering and data capability"
        - "Close collaboration with NRW stakeholders and product owners"
        - "Agile delivery using iterative sprints and continuous validation"
        - "Blended IBM and NRW teams supporting knowledge transfer"

  - modality: strategy
    fields:
      title: "Scaling from discovery into delivery"
      points:
        - "Alpha phase with small number of focused product teams"
        - "Beta phase expanding capability and delivery throughput"
        - "Live phase transitioning to sustainable operational teams"
        - "Progressive handover to NRW ownership"

  - modality: four_pillars
    fields:
      title: "Governance model"
      columns:
        - "Strategic governance ensuring alignment to organisational priorities"
        - "Programme governance managing delivery and dependencies"
        - "Technical governance ensuring architectural consistency"
        - "Integrated risk management embedded across all levels"

  - modality: hypothesis_success_criteria
    fields:
      title: "Key delivery risks and mitigations"
      body_left:
        - "Data quality challenges affecting identity matching accuracy"
        - "Legacy system dependencies impacting integration complexity"
        - "Security and compliance requirements influencing design"
        - "Organisational readiness for new ways of working"
      body_right:
        - "Structured data profiling and continuous quality validation"
        - "Integration layer that wraps existing systems without replacement"
        - "Compliance by design with embedded DPIA and security reviews"
        - "Change management and capability uplift embedded in delivery"

  - modality: four_pillars
    fields:
      title: "Security and sustainability by design"
      columns:
        - "Zero Trust principles embedded across architecture"
        - "Compliance aligned to UK GDPR and public sector standards"
        - "Observability and resilience built into all services"
        - "Continuous improvement driven by telemetry and feedback"

  - modality: section_divider
    fields:
      title: "Section 6: Website Innovation Approach"

  - modality: hypothesis_success_criteria
    fields:
      title: "12 week innovation window designed to reduce uncertainty"
      body_left:
        - "Hypothesis led approach focusing on measurable improvements"
        - "Testing usability, accessibility and content effectiveness"
      body_right:
        - "Operate within existing NRW technology constraints"
        - "Focus on evidence to support future investment decisions"

  - modality: strategy
    fields:
      title: "Four phase innovation approach"
      points:
        - "Explore and discover to define problems and hypotheses"
        - "Ideate and co create to test concepts quickly"
        - "Design and build to validate feasibility"
        - "Scale or stop based on evidence and outcomes"

  - modality: hypothesis_success_criteria
    fields:
      title: "Hypothesis driven delivery model"
      body_left:
        - "Improved navigation reduces user effort"
        - "Enhanced search improves content findability"
        - "Bilingual design improves accessibility and usability"
      body_right:
        - "Measured reduction in task completion time"
        - "Improved search success rate and engagement"
        - "Accessibility compliance and user feedback improvements"

  - modality: chosen_approach
    fields:
      title: "Outcome of innovation window"
      body_left:
        - "Validated hypotheses with clear evidence base"
        - "Reusable design and content patterns"
      body_right:
        - "Proven technical feasibility for key concepts"
        - "Decision ready backlog for future delivery"

  - modality: section_divider
    fields:
      title: "Section 7: Sustainability and Social Value"

  - modality: four_pillars
    fields:
      title: "Embedding sustainability into delivery"
      columns:
        - "Use of cloud platforms to improve energy efficiency"
        - "FinOps and GreenOps to manage cost and carbon impact"
        - "Optimisation of workloads and environments"
        - "Support environmental insight through data platforms"

  - modality: four_pillars
    fields:
      title: "Delivering social value in Wales"
      columns:
        - "Welsh based delivery through Stable partnership"
        - "Support for local employment and skills development"
        - "Engagement with Welsh SMEs and social enterprises"
        - "Structured and measurable social value commitments"

  - modality: section_divider
    fields:
      title: "Section 8: Commercial Approach"

  - modality: options_considered
    fields:
      title: "Flexible commercial models"
      intro: "We can operate across a range of commercial models depending on delivery phase and scope maturity."
      boxes:
        - "Time and materials for discovery and evolving scope"
        - "Fixed price where scope and outcomes are clear"
        - "Fixed capacity for controlled delivery periods"
        - "Supplier led services for ongoing operations"

  - modality: chosen_approach
    fields:
      title: "Commercial principles"
      body_left:
        - "Transparency of cost drivers and assumptions"
        - "Flexibility to adapt to delivery phase maturity"
      body_right:
        - "Alignment to value delivered and outcomes achieved"
        - "Support for blended delivery with NRW teams"

  - modality: section_divider
    fields:
      title: "Section 9: Closing and Discussion"

  - modality: next_steps
    fields:
      title: "Next steps"
      body_left:
        - "Provide further clarification on proposal areas as required"
        - "Refine scope and assumptions through dialogue"
        - "Align on priorities for discovery phase"
      body_right:
        - "Confirm stakeholders and engagement model"
        - "Agree mobilisation approach and timelines"
        - "Progress towards final tender submission"

  - modality: closing_slide
    fields:
      title: "Thank you"
      contact: "We welcome questions and discussion"