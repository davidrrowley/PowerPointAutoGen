slides:
  - modality: context_statement
    fields:
      title: "Structured PoC slide generation can preserve narrative clarity"

  - modality: problem_framing
    fields:
      title: "Manual PoC slide creation introduces inconsistency"
      body:
        - "Narrative structure varies between engagements"
        - "Slides often become overly text dense"
        - "Formatting effort distracts from reasoning"
        - "A repeatable structure would improve clarity"

  - modality: hypothesis_success_criteria
    fields:
      title: "The PoC must prove both narrative discipline and technical feasibility"
      body_left:
        - "Can a PoC narrative arc be expressed as structured data?"
        - "Can titles and bullets be constrained automatically?"
      body_right:
        - "Can PowerPoint templates be inspected reliably?"
        - "Can layouts be populated deterministically from Python?"

  - modality: options_considered
    fields:
      title: "Several paths were available, but only one balanced structure and control"
      body_left:
        - "Free AI slide generation"
        - "High flexibility"
        - "Weak layout discipline"
      body_right:
        - "Template-driven rendering"
        - "Lower freedom"
        - "Much stronger consistency"

  - modality: chosen_approach
    fields:
      title: "The chosen approach separates reasoning, rendering and template control"
      body:
        - "Narrative intent is defined in structured YAML"
        - "The renderer maps modalities to approved layouts"
        - "The template enforces visual consistency"

  - modality: architecture_view
    fields:
      title: "Architecture: narrative-driven slide generation pipeline"
      body:
        - "Narrative arc expressed as structured input"
        - "AI generates constrained slide content"
        - "Template layouts enforce spatial discipline"
      image: "example_architecture.png"

  - modality: learnings_constraints
    fields:
      title: "The mechanics are now proven, but image handling and modality growth remain"
      body:
        - "Template conversion from POTX to PPTX works locally"
        - "IBM placeholder mappings are now reliable"
        - "Picture insertion requires controlled image sizing"
        - "The next step is to expand modality coverage carefully"

  - modality: implications
    fields:
      title: "The generator can now evolve independently of the visual theme"
      body:
        - "Narrative structure is no longer tied directly to IBM layout names"
        - "The same modalities could later map to Microsoft-themed layouts"
        - "Claude can generate content without needing PowerPoint awareness"

  - modality: next_steps
    fields:
      title: "The next phase is to formalise schema and extend supported slide types"
      body_left:
        - "Add evidence and results modality"
        - "Add options considered modality"
      body_right:
        - "Define a proper JSON or YAML schema"
        - "Introduce validation for text density and image sizing"